<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>司机时间填报</title>

<style>
body { font-family: -apple-system; background: #f2f2f2; padding: 15px; }
.container { background: white; padding: 20px; border-radius: 12px; }
h2 { text-align: center; }
.day-block { margin-bottom: 15px; }
label { font-weight: bold; }
.checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 5px;
}
.checkbox-group label {
    background: #f5f5f5;
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 12px;
}
input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
}
button {
    width: 100%;
    padding: 15px;
    background: #07c160;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="container">
<h2>🚗 司机时间填报</h2>

<form onsubmit="submitForm(event)">

<input id="name" placeholder="司机姓名" required>

<select id="vehicle">
<option>请选择车型</option>
<option>Sedan</option>
<option>SUV</option>
<option>7座</option>
</select>

<div id="schedule"></div>

<textarea id="notes" placeholder="备注（如特殊时间/偏好）"></textarea>

<button type="submit">提交</button>

</form>
</div>

<script>

const days = ["周一","周二","周三","周四","周五","周六","周日"];
const slots = ["06:00-09:00","09:00-15:00","16:00-22:00","22:00-04:00"];

const container = document.getElementById("schedule");

days.forEach(day => {
    let block = document.createElement("div");
    block.className = "day-block";

    let title = document.createElement("label");
    title.innerText = day;

    let group = document.createElement("div");
    group.className = "checkbox-group";

    slots.forEach(slot => {
        let label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" value="${day} ${slot}"> ${slot}`;
        group.appendChild(label);
    });

    block.appendChild(title);
    block.appendChild(group);
    container.appendChild(block);
});

function submitForm(e) {
    e.preventDefault();

    let selected = [];
    document.querySelectorAll('input[type="checkbox"]:checked').forEach(el => {
        selected.push(el.value);
    });

    var output = '司机 🚗【排班填报】\n';
    output += '👤 ' + document.getElementById('name').value + '\n';
    output += '🚘 ' + document.getElementById('vehicle').value + '\n';
    output += '📅 \n' + selected.join('\n') + '\n';
    output += '📝 ' + document.getElementById('notes').value;

    fetch("👉换成你的Webhook", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            msg_type: "text",
            content: { text: output }
        })
    })
    .then(() => alert("✅ 已提交"))
    .catch(() => alert("❌ 提交失败"));
}

</script>

</body>
</html>
