<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>司机时间填报</title>

<style>
body { font-family: -apple-system; background: #f2f2f2; padding: 15px; }
.container { background: white; padding: 20px; border-radius: 12px; }
h2 { text-align: center; }
label { font-weight: bold; }
input, select, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
}
.checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}
.checkbox-group label {
    background: #f5f5f5;
    padding: 8px 10px;
    border-radius: 6px;
}
button {
    width: 100%;
    padding: 15px;
    background: #07c160;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="container">
<h2>🚗 司机时间填报</h2>

<form onsubmit="submitForm(event)">

<label>司机姓名</label>
<input id="name" required>

<label>车型</label>
<select id="vehicle">
<option>请选择车型</option>
<option>Sedan</option>
<option>SUV</option>
<option>7座</option>
</select>

<label>可工作日期（可多选）</label>
<div class="checkbox-group">
<label><input type="checkbox" value="周一"> 周一</label>
<label><input type="checkbox" value="周二"> 周二</label>
<label><input type="checkbox" value="周三"> 周三</label>
<label><input type="checkbox" value="周四"> 周四</label>
<label><input type="checkbox" value="周五"> 周五</label>
<label><input type="checkbox" value="周六"> 周六</label>
<label><input type="checkbox" value="周日"> 周日</label>
</div>

<label>时间段（例：08:00-12:00）</label>
<input id="times" required>

<label>夜单</label>
<select id="night">
<option>否</option>
<option>是</option>
</select>

<label>儿童座椅</label>
<select id="childSeat">
<option>否</option>
<option>是</option>
</select>

<label>备注</label>
<textarea id="notes"></textarea>

<button type="submit">提交</button>

</form>
</div>

<script>
function submitForm(e) {
    e.preventDefault();

    let days = [];
    document.querySelectorAll('input[type="checkbox"]:checked').forEach(el => {
        days.push(el.value);
    });

    var output = '司机 🚗【司机时间填报】\n';
    output += '👤 ' + document.getElementById('name').value + '\n';
    output += '🚘 ' + document.getElementById('vehicle').value + '\n';
    output += '📅 ' + days.join(', ') + '\n';
    output += '⏰ ' + document.getElementById('times').value + '\n';
    output += '🌙 夜单：' + document.getElementById('night').value + '\n';
    output += '👶 儿童座椅：' + document.getElementById('childSeat').value + '\n';
    output += '📝 ' + document.getElementById('notes').value;

    fetch("👉换成你的Webhook", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            msg_type: "text",
            content: { text: output }
        })
    })
    .then(() => alert("✅ 已提交"))
    .catch(() => alert("❌ 提交失败"));
}
</script>

</body>
</html>
