<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>司机排班填报</title>

<style>
body { font-family: -apple-system; background: #f2f2f2; padding: 15px; }
.container { background: white; padding: 20px; border-radius: 12px; }
h2 { text-align: center; }
.day-block { margin-bottom: 20px; }
.checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}
.checkbox-group label {
    background: #f5f5f5;
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 12px;
}
input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
}
button {
    width: 100%;
    padding: 15px;
    background: #07c160;
    color: white;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
<h2>🚗 司机排班填报</h2>

<form onsubmit="submitForm(event)">

<!-- 👤司机 -->
<select id="name" required>
<option value="">请选择司机</option>
<option>zephyr</option>
<option>jack</option>
<option>alex</option>
<option>yang</option>
<option>chiu</option>
<option>niuniu</option>
<option>jason</option>
<option>Laila</option>
<option>Arthur</option>
<option>anna</option>
<option>aliya</option>
<option>chole</option>
<option>Sonny</option>
<option>Cheng</option>
<option>sunflower</option>
<option>sissi</option>
<option>qunju</option>
<option>elly</option>
<option>carol</option>
</select>

<!-- 🚘车型 -->
<select id="vehicle">
<option>Sedan</option>
<option>SUV</option>
<option>7座</option>
</select>

<!-- 🌙夜单 -->
<select id="night">
<option value="否">是否接夜单（凌晨后）：否</option>
<option value="是">是否接夜单（凌晨后）：是</option>
</select>

<!-- 👶儿童座椅 -->
<select id="childSeat">
<option value="否">是否有儿童座椅：否</option>
<option value="是">是否有儿童座椅：是</option>
</select>

<!-- 📅排班 -->
<div id="schedule"></div>

<textarea id="notes" placeholder="备注"></textarea>

<button type="submit">提交</button>

</form>
</div>

<script>

const days = ["周一","周二","周三","周四","周五","周六","周日"];
const slots = ["06:00-09:00","09:00-15:00","16:00-22:00","22:00-04:00"];

const container = document.getElementById("schedule");

days.forEach(day => {
    let block = document.createElement("div");
    block.className = "day-block";

    let title = document.createElement("h4");
    title.innerText = day;

    let group = document.createElement("div");
    group.className = "checkbox-group";

    slots.forEach(slot => {
        let label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" value="${day}|${slot}"> ${slot}`;
        group.appendChild(label);
    });

    block.appendChild(title);
    block.appendChild(group);
    container.appendChild(block);
});

function submitForm(e) {
    e.preventDefault();

    let result = {};

    document.querySelectorAll('input[type="checkbox"]:checked').forEach(el => {
        let [day, time] = el.value.split("|");
        if (!result[day]) result[day] = [];
        result[day].push(time);
    });

    let text = '司机 🚗【排班填报】\n';
    text += '👤 ' + document.getElementById('name').value + '\n';
    text += '🚘 ' + document.getElementById('vehicle').value + '\n';
    text += '🌙 夜单：' + document.getElementById('night').value + '\n';
    text += '👶 儿童座椅：' + document.getElementById('childSeat').value + '\n';

    for (let day in result) {
        text += `${day}：${result[day].join(', ')}\n`;
    }

    text += '📝 ' + document.getElementById('notes').value;

    fetch("👉换成你的Webhook", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            msg_type: "text",
            content: { text }
        })
    })
    .then(() => alert("✅ 提交成功"))
    .catch(() => alert("❌ 提交失败"));
}

</script>

</body>
</html>
